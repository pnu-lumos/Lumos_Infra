events {
    # 동시에 처리할 수 있는 접속자 수
    worker_connections 1024;
}

# 80번으로 받아서 8000ㅇ번으로 내보내기 

http {
    server {
        # 80번 포트(HTTP)로 들어오는 요청을 기다립니다.
        listen 80;
        
        # 도메인이 아직 없으므로 IP 접속 등 모든 접속을 허용합니다.
        server_name _; 

        location / {
            # 핵심! 들어온 요청을 'backend' 컨테이너의 8000번 포트로 넘깁니다.
            # docker-compose에서 컨테이너 이름을 backend로 지었기 때문에 가능합니다.
            proxy_pass http://backend:8000;
            
            # 클라이언트의 진짜 IP 정보 등을 백엔드에 같이 넘겨줍니다.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # 백엔드가 응답할 때까지 기다려주는 시간 (LLM 분석이 오래 걸릴 수 있으니 넉넉히 120초로 잡습니다)
            proxy_read_timeout 120s;
        }
    }
}
